<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Real Ludo Game</title>

<style>
body{
  text-align:center;
  background:#1a1a1a;
  color:white;
  font-family:Arial;
}

.board{
  display:grid;
  grid-template-columns: repeat(15,35px);
  grid-template-rows: repeat(15,35px);
  justify-content:center;
  margin-top:20px;
}

.cell{
  width:35px;
  height:35px;
  border:1px solid #333;
  position:relative;
}

/* colors */
.red{background:#e53935;}
.green{background:#43a047;}
.yellow{background:#fdd835;}
.blue{background:#1e88e5;}
.white{background:#fafafa;}

.center{
  background:conic-gradient(red, yellow, green, blue);
}

/* token */
.token{
  width:70%;
  height:70%;
  border-radius:50%;
  position:absolute;
  top:15%;
  left:15%;
}
.tred{background:red;}
.tgreen{background:green;}
.tyellow{background:gold;}
.tblue{background:blue;}

button{
  padding:10px 20px;
  font-size:18px;
  margin-top:15px;
}
</style>
</head>

<body>

<h2>🎲 Ludo Game</h2>

<button onclick="rollDice()">Roll Dice</button>
<p id="info"></p>

<div class="board" id="board"></div>

<script>
let board=document.getElementById("board");

// create board
for(let i=0;i<225;i++){
  let cell=document.createElement("div");
  cell.className="cell";

  let r=Math.floor(i/15), c=i%15;

  if(r<6 && c<6) cell.classList.add("red");
  else if(r<6 && c>8) cell.classList.add("green");
  else if(r>8 && c<6) cell.classList.add("yellow");
  else if(r>8 && c>8) cell.classList.add("blue");
  else if(r==7 || c==7) cell.classList.add("white");

  if(r>=6 && r<=8 && c>=6 && c<=8){
    cell.classList.add("center");
  }

  board.appendChild(cell);
}

// PATH (simple cross path)
let path=[];
for(let i=0;i<15;i++) path.push(i*15+7);
for(let i=1;i<15;i++) path.push(7*15+i);

// players (1 token each)
let players=[
  {pos:-1,color:"tred"},
  {pos:-1,color:"tgreen"},
  {pos:-1,color:"tyellow"},
  {pos:-1,color:"tblue"}
];

let turn=0;

// draw
function draw(){
  let cells=document.getElementsByClassName("cell");
  for(let c of cells) c.innerHTML="";

  players.forEach(p=>{
    if(p.pos>=0){
      let token=document.createElement("div");
      token.className="token "+p.color;
      cells[path[p.pos]].appendChild(token);
    }
  });

  document.getElementById("info").innerHTML="Player "+(turn+1)+" turn";
}

// kill logic
function checkKill(cur){
  players.forEach((p,i)=>{
    if(i!==cur && p.pos===players[cur].pos && p.pos!==-1){
      p.pos=-1;
      alert("💥 Player "+(cur+1)+" killed Player "+(i+1));
    }
  });
}

// dice
function rollDice(){
  let dice=Math.floor(Math.random()*6)+1;

  let p=players[turn];

  // start only on 6
  if(p.pos===-1){
    if(dice===6) p.pos=0;
  }else{
    p.pos+=dice;
    if(p.pos>=path.length){
      alert("🎉 Player "+(turn+1)+" Wins!");
      location.reload();
    }
  }

  checkKill(turn);

  if(dice!==6){
    turn=(turn+1)%4;
  }

  document.getElementById("info").innerHTML=
    "Dice: "+dice+" | Player "+(turn+1)+" turn";

  draw();
}

draw();
</script>

</body>
</html>
